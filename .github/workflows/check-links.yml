name: Check external links

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/check-links.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check-links:
    name: Check external links in documentation
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check external links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --no-progress
            --cache
            --exclude 'fortuneservice'
            --exclude '\.internal'
            --exclude 'consul-register-example'
            --exclude-loopback
            --exclude-path 'build.sources'
            --host-concurrency 5
            --host-request-interval 250ms
            --include-fragments
            --require-https
            --retry-wait-time 5
            --root-dir '.'
            --scheme http
            --scheme https
            --verbose
            '**/*.md'
          failIfEmpty: true
          jobSummary: false

      - name: Add link checking results to job summary
        if: always()
        run: |
          if [ -f ./lychee/out.md ]; then
            sed 's/^# Summary$/# External link checking results/' ./lychee/out.md | tee -a "$GITHUB_STEP_SUMMARY" > ./lychee/results.md
          fi

      - name: Comment on PR with link check results
        if: always() && github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message-id: external-links-check
          message-path: ./lychee/results.md
